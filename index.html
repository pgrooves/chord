<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>Transposer — Open Chords</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme: only light;
  --bg:#faf8f2; --panel:#ffffff; --line:#e3ddd0;
  --ink:#17150e; --ink-dim:#6e6a5e;
  --accent:#1f8f7e; --accent-ink:#ffffff;
  --card:#ffffff; --grid-string:#1a1a1a; --grid-fret:#b9b6ae; --inlay:#c9c6be;
}
*{box-sizing:border-box; margin:0; padding:0}
html{scroll-behavior:smooth; background:#faf8f2}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto} *{transition:none!important; animation:none!important}}
body{background:#faf8f2; background:var(--bg); color:var(--ink); font-family:'Inter',system-ui,-apple-system,sans-serif; min-height:100vh}
.wrap{max-width:1100px; margin:0 auto; padding:0 20px}

/* ── mosaic signature band ── */
#mosaic{display:grid; grid-auto-flow:column; height:64px; width:100%; gap:0; overflow:hidden}
#mosaic span{display:block; transition:background-color .6s ease}

/* ── masthead ── */
header.mast{padding:34px 0 10px}
.kicker{font-family:‘Poppins’,sans-serif; font-weight:600; font-size:.72rem; letter-spacing:.34em; text-transform:uppercase; color:var(–accent); transition:color .4s}
h1{font-family:‘Poppins’,sans-serif; font-weight:800; font-size:clamp(1.9rem,5.4vw,3.1rem); letter-spacing:.06em; text-transform:uppercase; line-height:1.05; margin-top:6px}
.byline{color:var(–ink-dim); font-size:.86rem; margin-top:8px}

/* ── controls ── */
.controls{position:sticky; top:0; z-index:20; background:var(–bg); padding:18px 0 14px; border-bottom:1px solid var(–line)}
.controls-inner{display:grid; grid-template-columns:auto 1fr 1fr; gap:12px; align-items:end}
.field label{display:block; font-size:.7rem; letter-spacing:.18em; text-transform:uppercase; color:var(–ink-dim); margin-bottom:7px; font-weight:600}
.seg{display:flex; border:1px solid var(–line); border-radius:10px; overflow:hidden; background:var(–panel)}
.seg button{appearance:none; border:0; background:transparent; color:var(–ink-dim); font:600 .88rem ‘Inter’,sans-serif; padding:11px 16px; cursor:pointer; transition:background .25s,color .25s; white-space:nowrap}
.seg button[aria-pressed=“true”]{background:var(–accent); color:var(–accent-ink)}
.seg button:focus-visible, select:focus-visible{outline:2px solid var(–accent); outline-offset:2px}
select{width:100%; appearance:none; background:var(–panel) url(“data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' stroke='%239a968c' stroke-width='2' fill='none'/></svg>”) no-repeat right 14px center; border:1px solid var(–line); border-radius:10px; color:var(–ink); font:600 .95rem ‘Inter’,sans-serif; padding:11px 38px 11px 14px; cursor:pointer}
.tuneline{margin-top:10px; font-size:.84rem; color:var(–ink-dim)}
.tuneline b{color:var(–ink); font-weight:600; letter-spacing:.12em}

/* ── progression banner ── */
.prog-banner{margin:26px 0 4px; display:flex; flex-wrap:wrap; align-items:baseline; gap:10px 18px}
.prog-banner .keyname{font-family:‘Poppins’,sans-serif; font-weight:800; font-size:1.5rem; letter-spacing:.04em}
.prog-banner .numerals{color:var(–accent); font-weight:600; letter-spacing:.14em}
.prog-banner .chordseq{color:var(–ink-dim); font-size:.95rem}
.capo-note{margin:10px 0 0; padding:10px 14px; border-left:3px solid var(–accent); background:var(–panel); border-radius:0 8px 8px 0; font-size:.86rem; color:var(–ink-dim); max-width:640px}
.capo-note b{color:var(–ink)}
.ring-demo{display:inline-block; width:11px; height:11px; border-radius:50%; border:2.5px solid var(–accent); vertical-align:-1px}

/* ── option rows ── */
.option{margin:30px 0 6px}
.option h2{font-family:‘Poppins’,sans-serif; font-weight:600; font-size:.86rem; letter-spacing:.22em; text-transform:uppercase; color:var(–ink); display:flex; align-items:center; gap:12px}
.option h2 .alt-tag{font-size:.62rem; letter-spacing:.18em; background:var(–accent); color:var(–accent-ink); border-radius:4px; padding:3px 8px}
.option h2::after{content:””; flex:1; height:1px; background:var(–line)}
.cards{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-top:14px}
.card{background:var(–card); border:1px solid var(–line); border-radius:12px; padding:12px 8px 8px; display:flex; flex-direction:column; align-items:center; box-shadow:0 1px 3px rgba(40,35,20,.07)}
.card .cname{font-family:‘Poppins’,sans-serif; font-weight:600; color:#111; font-size:.95rem; margin-bottom:2px; text-align:center; min-height:1.3em}
.card svg{width:100%; height:auto; display:block}

footer{margin:54px 0 26px; color:var(–ink-dim); font-size:.78rem; line-height:1.6; border-top:1px solid var(–line); padding-top:18px}

@media (max-width:860px){
.controls-inner{grid-template-columns:1fr 1fr}
.controls-inner .field-tuning{grid-column:1/-1}
.seg{width:100%}
.seg button{flex:1; padding:11px 6px}
}
@media (max-width:560px){
.cards{grid-template-columns:repeat(2,1fr); gap:10px}
#mosaic{height:46px}
.prog-banner .keyname{font-size:1.25rem}
}
@media (prefers-color-scheme: dark){html,body{background:#faf8f2!important; color:#17150e!important}}

/* ── tuner (additive) ── */
.tuner{margin-bottom:14px}
.tuner-label{font-size:.7rem; letter-spacing:.18em; text-transform:uppercase; color:var(–ink-dim); font-weight:600; margin-bottom:7px; display:flex; align-items:baseline; gap:10px}
.tuner-label small{text-transform:none; letter-spacing:0; font-weight:400; font-size:.72rem; opacity:.75}
.tuner-row{display:grid; grid-template-columns:repeat(6,1fr); gap:8px}
.tuner-row button{appearance:none; border:1px solid var(–line); background:var(–panel); border-radius:10px; padding:9px 2px 7px; cursor:pointer; font-family:‘Inter’,system-ui,sans-serif; color:var(–ink); transition:background .2s,border-color .2s,color .2s; line-height:1.15}
.tuner-row button .n{display:block; font-weight:600; font-size:1rem}
.tuner-row button .o{display:block; font-size:.66rem; color:var(–ink-dim)}
.tuner-row button.playing{background:var(–accent); border-color:var(–accent); color:var(–accent-ink)}
.tuner-row button.playing .o{color:var(–accent-ink); opacity:.8}
.tuner-row button:focus-visible{outline:2px solid var(–accent); outline-offset:2px}
@media (max-width:560px){.tuner-row{gap:6px}.tuner-row button .n{font-size:.9rem}}

/* ── octave shift (additive) ── */
.tuner-row{grid-template-columns:repeat(6,1fr) 34px 34px}
.tuner-row button.oct{padding:6px 0; font-weight:700; font-size:1.15rem; color:var(–accent); display:flex; align-items:center; justify-content:center}
.tuner-row button.oct:disabled{opacity:.32; cursor:default}
#oct-read{margin-left:auto; text-transform:none; letter-spacing:.02em; font-weight:600; font-size:.72rem; color:var(–accent)}
@media (max-width:560px){.tuner-row{grid-template-columns:repeat(6,1fr) 30px 30px}}

/* ── strummable chords (additive) ── */
.strum{display:flex; align-items:center; gap:12px; margin-top:10px}
.strum-lab{font-size:.7rem; letter-spacing:.18em; text-transform:uppercase; color:var(–ink-dim); font-weight:600}
.sseg{display:flex; border:1px solid var(–line); border-radius:8px; overflow:hidden; background:var(–panel)}
.sseg button{appearance:none; border:0; background:transparent; color:var(–ink-dim); font:600 .78rem ‘Inter’,system-ui,sans-serif; padding:7px 14px; cursor:pointer; transition:background .2s,color .2s}
.sseg button.on{background:var(–accent); color:var(–accent-ink)}
.sseg button:focus-visible{outline:2px solid var(–accent); outline-offset:2px}
.strum small{font-size:.72rem; color:var(–ink-dim); opacity:.75}
.card{cursor:pointer; -webkit-tap-highlight-color:transparent; transition:box-shadow .15s,border-color .15s}
.card.strumming{border-color:var(–accent); box-shadow:0 0 0 2px var(–accent)}
@media (max-width:560px){.strum small{display:none}}
</style>

</head>
<body>
<div id="mosaic" aria-hidden="true"></div>
<div class="wrap">
  <header class="mast">
    <div class="kicker">Open Chords</div>
    <h1>Transposer</h1>
    <div class="byline">Every voicing in Open D, DADGAD &amp; Open G — in any key, instantly.</div>
  </header>

  <div class="controls">
    <div class="tuner">
      <div class="tuner-label"><span>Tuner</span><small>tap a string — ring switch on to hear</small><span id="oct-read"></span></div>
      <div class="tuner-row" id="tuner-row"></div>
      <div class="strum"><span class="strum-lab">Strum</span>
        <div class="sseg" id="strum-seg">
          <button type="button" data-g="190">Slow</button>
          <button type="button" data-g="105" class="on">Medium</button>
          <button type="button" data-g="45">Fast</button>
        </div>
        <small>tap any chord to hear it</small>
      </div>
    </div>
    <div class="controls-inner">
      <div class="field field-tuning">
        <label id="lab-tuning">Tuning</label>
        <div class="seg" role="group" aria-labelledby="lab-tuning">
          <button data-t="od" aria-pressed="true">Open D</button>
          <button data-t="dd" aria-pressed="false">DADGAD</button>
          <button data-t="og" aria-pressed="false">Open G</button>
          <button data-t="fa" aria-pressed="false">FACGCE</button>
        </div>
      </div>
      <div class="field">
        <label for="sel-key">Key</label>
        <select id="sel-key"></select>
      </div>
      <div class="field">
        <label for="sel-prog">Progression</label>
        <select id="sel-prog"></select>
      </div>
    </div>
    <div class="tuneline" id="tuneline"></div>
  </div>

  <div class="prog-banner" id="banner"></div>
  <div id="capo"></div>
  <main id="options"></main>
</div>

const DEG = {'I':[0,''],'ii':[2,'m'],'iii':[4,'m'],'IV':[5,''],'V':[7,''],'vi':[9,'m']};
const SHARPS=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FLATS =['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const KEYS  =['C','Db','D','Eb','E','F','F#','G','Ab','A','Bb','B'];
const FLATKEYS=new Set(['F','Bb','Eb','Ab','Db']);
const PC={'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'F':5,'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11};
const noteName=(pc,key)=> (FLATKEYS.has(key)?FLATS:SHARPS)[((pc%12)+12)%12];
const INLAY=new Set([3,5,7,9,15,17]); // 12 handled as double

let state={t:'od', key:'D', prog:0};

function transposeName(numeral,suffix,key){
  const [deg,minor]=DEG[numeral];
  let name=noteName(PC[key]+deg,key)+minor+suffix;
  const m=suffix.match(/^(.*)\/([A-G][#b]?)$/);
  if(m){ // transpose slash bass relative to native key
    const shift=(PC[key]-PC[TUNINGS[state.t].nativeKey]+12)%12;
    name=noteName(PC[key]+deg,key)+minor+m[1]+'/'+noteName(PC[m[2]]+shift,key);
  }
  return name;
}

function diagramSVG(frets,shift,accent,barres){
  const fretted=frets.filter(f=>f>0);
  let base=1, rows=4;
  if(fretted.length){
    const lo=Math.min(...fretted), hi=Math.max(...fretted);
    if(hi<=4){base=1; rows=4}
    else {base=lo; rows=Math.max(4,hi-lo+1)}
  }
  const W=150,TOP=26,LEFT=30,RIGHT=12,SP=(W-LEFT-RIGHT)/5, RH=26;
  const H=TOP+rows*RH+10;
  const sx=i=>LEFT+i*SP, fy=r=>TOP+r*RH;
  let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img">`;
  for(let r=0;r<=rows;r++){
    const isNut=(r===0&&base===1);
    s+=`<line x1="${sx(0)}" y1="${fy(r)}" x2="${sx(5)}" y2="${fy(r)}" stroke="${isNut?'#111':'#b9b6ae'}" stroke-width="${isNut?5:1.6}"/>`;
  }
  for(let r=0;r<rows;r++){
    const f=base+r, cy=fy(r)+RH/2;
    if(f===12){
      s+=`<circle cx="${(sx(1)+sx(2))/2}" cy="${cy}" r="4.6" fill="#c9c6be"/><circle cx="${(sx(3)+sx(4))/2}" cy="${cy}" r="4.6" fill="#c9c6be"/>`;
    } else if(INLAY.has(f)){
      s+=`<circle cx="${(sx(2)+sx(3))/2}" cy="${cy}" r="4.6" fill="#c9c6be"/>`;
    }
    if(INLAY.has(f)||f===12||(r===0&&base>1)){
      s+=`<text x="${LEFT-9}" y="${cy+4}" font-size="11.5" font-family="Inter,system-ui,sans-serif" fill="#555" text-anchor="end">${f}</text>`;
    }
  }
  for(let i=0;i<6;i++)
    s+=`<line x1="${sx(i)}" y1="${fy(0)}" x2="${sx(i)}" y2="${fy(rows)}" stroke="#1a1a1a" stroke-width="1.8"/>`;
  for(let i=0;i<6;i++){
    const f=frets[i];
    if(f===-1){
      s+=`<path d="M${sx(i)-5} ${TOP-17} l10 10 M${sx(i)+5} ${TOP-17} l-10 10" stroke="#111" stroke-width="2"/>`;
    } else if(f===0){
      s+=`<circle cx="${sx(i)}" cy="${TOP-12}" r="5.2" fill="none" stroke="#111" stroke-width="2"/>`;
    } else {
      const r=f-base; if(r<0||r>=rows) continue;
      const cy=fy(r)+RH/2;
      const wasOpen=(shift>0&&f===shift);
      s+= wasOpen
        ? `<circle cx="${sx(i)}" cy="${cy}" r="7.6" fill="#ffffff" stroke="${accent}" stroke-width="3.4"/>`
        : `<circle cx="${sx(i)}" cy="${cy}" r="8.2" fill="#111"/>`;
    }
  }
  // book barre arcs (black)
  (barres||[]).forEach(([f,s1,s2])=>{
    const r=f-base; if(r<0||r>=rows) return;
    const y=fy(r)+RH/2-9.5, xm=(sx(s1)+sx(s2))/2;
    s+=`<path d="M${sx(s1)} ${y} Q ${xm} ${y-11} ${sx(s2)} ${y}" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>`;
  });
  // capo barre arc over ring notes (accent)
  if(shift>0){
    const ringStrs=frets.map((f,i)=>f===shift?i:-1).filter(i=>i>=0);
    if(ringStrs.length>=2){
      const r=shift-base;
      if(r>=0&&r<rows){
        const y=fy(r)+RH/2-10.5, x1=sx(ringStrs[0]), x2=sx(ringStrs[ringStrs.length-1]);
        s+=`<path d="M${x1} ${y} Q ${(x1+x2)/2} ${y-11} ${x2} ${y}" fill="none" stroke="${accent}" stroke-width="2.6" stroke-linecap="round" opacity="0.9"/>`;
      }
    }
  }
  return s+'</svg>';
}

function renderMosaic(){
  const p=TUNINGS[state.t].palette, el=document.getElementById('mosaic');
  const n=Math.max(18,Math.floor(window.innerWidth/34));
  let html='';
  for(let i=0;i<n;i++){
    const on=Math.random()>0.32;
    html+=`<span style="background:${on?p[Math.floor(Math.random()*p.length)]:'#efe9dc'}"></span>`;
  }
  el.innerHTML=html;
}

function render(){
  const T=TUNINGS[state.t];
  document.documentElement.style.setProperty('--accent',T.accent);
  document.documentElement.style.setProperty('--accent-ink',T.accentInk);
  document.querySelectorAll('.seg button').forEach(b=>b.setAttribute('aria-pressed',String(b.dataset.t===state.t)));
  document.getElementById('tuneline').innerHTML=
    `${T.label} tuning — <b>${T.notes.join(' ')}</b> · written in ${T.nativeKey} major`;

  const prog=DATA[state.t][state.prog];
  const numerals=prog.n.split(' ');
  const shift=(PC[state.key]-PC[T.nativeKey]+12)%12;
  const names=numerals.map((nu,i)=>transposeName(nu,'',state.key));
  document.getElementById('banner').innerHTML=
    `<span class="keyname">${state.key} Major</span><span class="numerals">${prog.n}</span><span class="chordseq">${names.join(' — ')}</span>`;

  document.getElementById('capo').innerHTML = shift===0 ? '' :
    `<div class="capo-note">Shapes shifted <b>+${shift} frets</b>. Ring-marked notes <span class="ring-demo"></span> were open strings — barre them at fret ${shift}, or put a <b>capo at fret ${shift}</b> to play the original open shapes.</div>`;

  let html='';
  prog.o.forEach((row,oi)=>{
    const alt=oi>=5;
    html+=`<section class="option"><h2>Option ${oi%5+1}${alt?'<span class="alt-tag">Alternate</span>':''}</h2><div class="cards">`;
    row.forEach((ch,ci)=>{
      const frets=ch[1].map(f=>f<0?-1:f+shift);
      const barres=(ch[2]||[]).map(b=>[b[0]+shift,b[1],b[2]]);
      const nm=transposeName(numerals[ci],ch[0],state.key);
      html+=`<div class="card"><div class="cname">${nm}</div>${diagramSVG(frets,shift,T.accent,barres)}</div>`;
    });
    html+='</div></section>';
  });
  document.getElementById('options').innerHTML=html;
}

function init(){
  const sk=document.getElementById('sel-key');
  sk.innerHTML=KEYS.map(k=>`<option ${k==='D'?'selected':''}>${k}</option>`).join('');
  const sp=document.getElementById('sel-prog');
  sp.innerHTML=DATA.od.map((p,i)=>`<option value="${i}">${p.n}</option>`).join('');
  sk.addEventListener('change',()=>{state.key=sk.value; render()});
  sp.addEventListener('change',()=>{state.prog=+sp.value; render()});
  document.querySelectorAll('.seg button').forEach(b=>b.addEventListener('click',()=>{
    state.t=b.dataset.t;
    state.key=TUNINGS[state.t].nativeKey;
    sk.value=state.key;
    renderMosaic(); render();
  }));
  renderMosaic(); render();
}

function tunerStop(i){
  const a=tActive[i]; if(!a) return;
  try{
    const t=actx.currentTime;
    a.g.gain.cancelScheduledValues(t);
    a.g.gain.setValueAtTime(Math.max(a.g.gain.value,0.0001),t);
    a.g.gain.exponentialRampToValueAtTime(0.0001,t+0.06);
    a.o1.stop(t+0.08); a.o2.stop(t+0.08);
  }catch(e){}
  clearTimeout(a.tm); a.btn.classList.remove('playing'); tActive[i]=null;
}

function tunerPlay(i){
  if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  if(tActive[i]){ tunerStop(i); return; }
  const f=TUNER[state.t].f[i]*Math.pow(2,tOct), t=actx.currentTime;
  const g=actx.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.5,t+0.04);
  g.gain.setValueAtTime(0.5,t+2.0);
  g.gain.exponentialRampToValueAtTime(0.0001,t+3.2);
  g.connect(actx.destination);
  const o1=actx.createOscillator(); o1.type='sine'; o1.frequency.value=f;
  const g1=actx.createGain(); g1.gain.value=0.72; o1.connect(g1); g1.connect(g);
  const o2=actx.createOscillator(); o2.type='sine'; o2.frequency.value=f*2;   // octave harmonic for phone-speaker audibility
  const g2=actx.createGain(); g2.gain.value=0.28; o2.connect(g2); g2.connect(g);
  o1.start(t); o2.start(t); o1.stop(t+3.3); o2.stop(t+3.3);
  const btn=document.querySelectorAll('#tuner-row button')[i];
  if(btn) btn.classList.add('playing');
  tActive[i]={o1,o2,g,btn:btn||{classList:{remove(){}}},tm:setTimeout(()=>{ if(tActive[i]){tActive[i].btn.classList.remove('playing'); tActive[i]=null;} },3250)};
}

function renderTuner(){
  const T=TUNER[state.t], el=document.getElementById('tuner-row');
  if(!el) return;
  el.innerHTML=T.l.map((lab,i)=>{
    const note=lab.slice(0,-1), oct=+lab.slice(-1)+tOct;
    return `<button type="button" aria-label="Play ${note}${oct} (string ${6-i})"><span class="n">${note}</span><span class="o">string ${6-i} · ${oct}</span></button>`;
  }).join('')
  +`<button type="button" class="oct" id="oct-dn" aria-label="Octave down" ${tOct<=TOCT_MIN?'disabled':''}>&minus;</button>`
  +`<button type="button" class="oct" id="oct-up" aria-label="Octave up" ${tOct>=TOCT_MAX?'disabled':''}>+</button>`;
  const btns=el.querySelectorAll('button');
  btns.forEach((b,i)=>{ if(i<6) b.addEventListener('click',()=>tunerPlay(i)); });
  const dn=document.getElementById('oct-dn'), up=document.getElementById('oct-up');
  if(dn) dn.addEventListener('click',()=>tunerOct(-1));
  if(up) up.addEventListener('click',()=>tunerOct(1));
  const rd=document.getElementById('oct-read');
  if(rd) rd.textContent = tOct===0 ? 'octave ±0' : 'octave '+(tOct>0?'+':'')+tOct;
}
function tunerOct(d){
  const nv=Math.min(TOCT_MAX,Math.max(TOCT_MIN,tOct+d));
  if(nv===tOct) return;
  tOct=nv;
  tActive.forEach((a,i)=>a&&tunerStop(i));
  renderTuner();
}

document.querySelectorAll('.seg button').forEach(b=>b.addEventListener('click',()=>{
  tActive.forEach((a,i)=>a&&tunerStop(i));
  renderTuner();
}));
renderTuner();

/* ── strummable chords (additive) ── */
let strumGap=105, strumComp=null;
const strumActive=new Map();
document.querySelectorAll('#strum-seg button').forEach(b=>b.addEventListener('click',()=>{
  strumGap=+b.dataset.g;
  document.querySelectorAll('#strum-seg button').forEach(x=>x.classList.toggle('on',x===b));
}));
function strumChord(card,frets){
  if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  if(!strumComp){ strumComp=actx.createDynamicsCompressor(); strumComp.threshold.value=-14; strumComp.ratio.value=8; strumComp.connect(actx.destination); }
  const prev=strumActive.get(card);
  if(prev){
    try{
      const t=actx.currentTime;
      prev.gains.forEach(g=>{g.gain.cancelScheduledValues(t); g.gain.setValueAtTime(Math.max(g.gain.value,1e-4),t); g.gain.exponentialRampToValueAtTime(1e-4,t+0.05);});
      prev.oscs.forEach(o=>o.stop(t+0.07));
    }catch(e){}
    clearTimeout(prev.tm); card.classList.remove('strumming'); strumActive.delete(card);
  }
  const base=TUNER[state.t].f, notes=[];
  frets.forEach((f,i)=>{ if(f>=0) notes.push(base[i]*Math.pow(2,f/12)); });
  if(!notes.length) return;
  const t0=actx.currentTime+0.03, gap=strumGap/1000, oscs=[], gains=[];
  notes.forEach((fr,k)=>{
    const ts=t0+k*gap;
    const g=actx.createGain();
    g.gain.setValueAtTime(1e-4,ts);
    g.gain.exponentialRampToValueAtTime(0.26,ts+0.02);
    g.gain.setValueAtTime(0.26,ts+1.2);
    g.gain.exponentialRampToValueAtTime(1e-4,ts+2.8);
    g.connect(strumComp);
    const o1=actx.createOscillator(); o1.type='sine'; o1.frequency.value=fr;
    const g1=actx.createGain(); g1.gain.value=0.66; o1.connect(g1); g1.connect(g);
    const o2=actx.createOscillator(); o2.type='sine'; o2.frequency.value=fr*2;
    const g2=actx.createGain(); g2.gain.value=0.22; o2.connect(g2); g2.connect(g);
    o1.start(ts); o2.start(ts); o1.stop(ts+2.9); o2.stop(ts+2.9);
    oscs.push(o1,o2); gains.push(g);
  });
  card.classList.add('strumming');
  const tm=setTimeout(()=>{card.classList.remove('strumming'); strumActive.delete(card);}, (notes.length-1)*strumGap+2900);
  strumActive.set(card,{oscs,gains,tm});
}
(function(){
  const optEl=document.getElementById('options');
  if(!optEl) return;
  optEl.addEventListener('click',e=>{
    const card=(e.target&&e.target.closest)?e.target.closest('.card'):null;
    if(!card) return;
    const cards=Array.prototype.slice.call(optEl.querySelectorAll('.card'));
    const idx=cards.indexOf(card);
    if(idx<0) return;
    const oi=Math.floor(idx/4), ci=idx%4;
    const T=TUNINGS[state.t];
    const shift=(PC[state.key]-PC[T.nativeKey]+12)%12;
    const ch=DATA[state.t][state.prog].o[oi][ci];
    const frets=ch[1].map(f=>f<0?-1:f+shift);
    strumChord(card,frets);
  });
})();
</script>
